############### BEGIN OPENCODE DISPLAY MENU OVERRIDES ###############
# Klipper's default LCD menu still uses the legacy "OctoPrint" label.
# Override just the visible name while keeping the existing submenu wiring.

[menu __main __octoprint]
type: list
name: Print

[menu __main __octoprint __pause]
type: command
enable: {printer.idle_timeout.state == "Printing"}
name: Pause
gcode:
  {% if "pause_resume" in printer %}
    PAUSE
  {% endif %}

[menu __main __octoprint __resume]
type: command
enable: {printer.print_stats.state == "paused"}
name: Resume
gcode:
  {% if "pause_resume" in printer %}
    RESUME
  {% endif %}

[menu __main __octoprint __abort]
type: command
enable: {printer.print_stats.state == "printing" or printer.print_stats.state == "paused"}
name: Cancel Print
gcode:
  {% if "pause_resume" in printer %}
    CANCEL_PRINT
  {% endif %}

# Hide the stock Setup -> Restart subtree and expose a clearer top-level
# power control menu instead.
[menu __main __setup __restart]
type: list
enable: False
name: Restart

[menu __main __power]
type: list
name: Power

[menu __main __power __host_restart]
type: command
enable: {printer.idle_timeout.state != "Printing"}
name: Restart Pi
gcode:
  { menu.exit(True) }
  RESTART

[menu __main __power __firmware_restart]
type: command
enable: {printer.idle_timeout.state != "Printing"}
name: Restart FW
gcode:
  { menu.exit(True) }
  FIRMWARE_RESTART

[menu __main __power __shutdown_pi]
type: command
enable: {printer.idle_timeout.state != "Printing"}
name: Shutdown Pi
gcode:
  { menu.exit(True) }
  SHUTDOWN_PI

[menu __main __filament]
type: list
name: Filament

[menu __main __filament __load]
type: list
name: Load

[menu __main __filament __load __200]
type: command
enable: {printer.idle_timeout.state != "Printing"}
name: Load 200
gcode:
    LOAD_FILAMENT TEMP=200

[menu __main __filament __load __230]
type: command
enable: {printer.idle_timeout.state != "Printing"}
name: Load 230
gcode:
    LOAD_FILAMENT TEMP=230

[menu __main __filament __load __250]
type: command
enable: {printer.idle_timeout.state != "Printing"}
name: Load 250
gcode:
    LOAD_FILAMENT TEMP=250

[menu __main __filament __unload]
type: list
name: Unload

[menu __main __filament __unload __200]
type: command
enable: {printer.idle_timeout.state != "Printing"}
name: Unload 200
gcode:
    UNLOAD_FILAMENT TEMP=200

[menu __main __filament __unload __230]
type: command
enable: {printer.idle_timeout.state != "Printing"}
name: Unload 230
gcode:
    UNLOAD_FILAMENT TEMP=230

[menu __main __filament __unload __250]
type: command
enable: {printer.idle_timeout.state != "Printing"}
name: Unload 250
gcode:
    UNLOAD_FILAMENT TEMP=250

############### END OPENCODE DISPLAY MENU OVERRIDES ###############
