############### BEGIN OPENCODE SHUTDOWN PLACEHOLDER ###############
# Display-driven Raspberry Pi shutdown using Moonraker's
# `shutdown_machine` remote method.
#
# Important: action_call_remote_method() executes when the macro is evaluated,
# not when later gcode lines run. The delayed_gcode below ensures heater-off
# and display updates are issued before the host shutdown request.

[gcode_macro SHUTDOWN_PI]
description: Safely power off the Raspberry Pi host
gcode:
  {% if printer.idle_timeout.state == "Printing" %}
    {action_raise_error("Refusing to shut down the host while a print is active")}
  {% endif %}
  {% if 'extruder' in printer and printer.extruder.temperature > 70 %}
    {action_raise_error("Refusing to shut down the host while the hotend is above 70C")}
  {% endif %}
  TURN_OFF_HEATERS
  M107
  M84
  M117 Shutting down...
  SET_DISPLAY_TEXT MSG="Shutting down..."
  RESPOND TYPE=command MSG="Moonraker host shutdown requested"
  UPDATE_DELAYED_GCODE ID=OPENCODE_SHUTDOWN_PI DURATION=4

[delayed_gcode OPENCODE_SHUTDOWN_PI]
gcode:
  {action_call_remote_method("shutdown_machine")}

############### END OPENCODE SHUTDOWN PLACEHOLDER ###############
